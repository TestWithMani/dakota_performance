name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r salesforce_tab_performance/requirements.txt

      - name: Validate test discovery
        run: |
          pytest -q --collect-only

      - name: Validate marker subsets discovery
        run: |
          pytest -q -m smoke --collect-only
          pytest -q -m Test --collect-only
          pytest -q -m metro_areas --collect-only
          pytest -q -m reports --collect-only
          pytest -q -m custom_dashboards --collect-only
